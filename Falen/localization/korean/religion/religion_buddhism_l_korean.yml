 #불교 그룹 종교
 jogye:0 "조계종"
 jogye_adj:0 "조계종"
 jogye_adherent:0 "조계종단원"
 jogye_adherent_plural:0 "조계종단원"
 jogye_desc:0 "사건 이후 조계종은 하나로 뭉쳐 불법을 수호하는데 성공하였습니다. 그리고 불법을 지키기 위해 필요한 것은 부처의 뜻을 따르는 질서를 그들의 손으로 만들어내는 것입니다."
 
 maitreya:0 "미륵종"
 maitreya_adj:0 "미륵종"
 maitreya_adherent:0 "미륵종단원"
 maitreya_adherent_plural:0 "미륵종단원"
 maitreya_desc:0 "속세의 혼란이 극에 달하면 미륵불이 내려와 이 세상의 모든 고통을 구제하고 깨달음을 선사하실 것이라고 합니다. 그들이 할 일은 미륵불이 올때까지 그저 기다리는 것 뿐입니다."
 
 bailian:0 "백련종"
 bailian_adj:0 "백련종"
 bailian_adherent:0 "백련종단원"
 bailian_adherent_plural:0 "백련종단원"
 bailian_desc:0 "현재의 불법은 석가세존의 가르침에서 너무나도 벗어나 있습니다. 물위에 핀 하얀 연꽃처럼, 불법을 다시 정화해야 깨달음을 얻을 수 있습니다."
 
 esoteric:0 "밀교"
 esoteric_adj:0 "밀교"
 esoteric_adherent:0 "밀교인"
 esoteric_adherent_plural:0 "밀교인"
 esoteric_desc:0 "비밀스럽게 전수되는 이 불법은 해탈로 가기 위한 전혀 새로운 방법을 제시해 줍니다."

